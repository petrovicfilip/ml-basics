version: "3.8"

services:
  kafka:
    image: docker.io/bitnami/kafka:4.0
    container_name: kafka
    ports:
      - "9092:9092"
    volumes:
      - "kafka_master:/bitnami"
    environment:
      # KRaft settings
      - KAFKA_CFG_NODE_ID=0
      - KAFKA_CFG_PROCESS_ROLES=controller,broker
      - KAFKA_CFG_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      # Listeners
      - KAFKA_CFG_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:9094
      - KAFKA_CFG_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092,INTERNAL://kafka:9094
      - KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      - KAFKA_CFG_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_CFG_INTER_BROKER_LISTENER_NAME=INTERNAL
      # Kafka settings
      - KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE=false
      # Retention
      # - KAFKA_CFG_LOG_RETENTION_MS=300000
      # - KAFKA_CFG_LOG_RETENTION_CHECK_INTERVAL_MS=30000
      # - KAFKA_CFG_LOG_CLEANUP_POLICY=delete
    networks:
      - master


volumes:

  kafka_master:
    # external: true
    name: kafka_master
    external: true

networks:
  master:
    external: true
